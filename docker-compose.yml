version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bgv_postgres
    restart: always
    environment:
      POSTGRES_USER: bgv_user
      POSTGRES_PASSWORD: bgv_password
      POSTGRES_DB: bgv_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
